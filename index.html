<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Catasto Pro - Accesso Flessibile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/proj/proj4.js"></script>

  <style>
    html, body { margin:0; height:100%; overflow: hidden; font-family: sans-serif; }
    #map { width:100%; height:100%; background: #ffffff; }

    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 50px;
      background: #2c3e50; display: flex; align-items: center;
      padding: 0 20px; color: white; z-index: 1001;
    }
    .slider-box { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 500px; }
    
    /* Login migliorato con chiusura */
    #login-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 2000;
    }
    .login-box { 
      background: white; padding: 30px; border-radius: 12px; text-align: center; 
      width: 300px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .close-login { 
      position: absolute; top: 10px; right: 15px; font-size: 20px; 
      cursor: pointer; color: #999; font-weight: bold; 
    }
    .login-box input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

    .panel {
      position: absolute; top: 60px; left: 10px; background: rgba(255,255,255,0.95);
      padding: 15px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.2);
      width: 270px; z-index: 1000;
    }

    .section { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
    .filter-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 6px; }

    button { cursor:pointer; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; font-size: 12px; }
    .btn-primary { background: #007bff; color: white; border: none; }
    
    #info-box { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 6px; display: none; border-left: 5px solid #007bff; }
    #coords-info { position: absolute; bottom: 10px; right: 10px; background: white; padding: 5px; font-family: monospace; font-size: 12px; border: 1px solid #ccc; }
    
    .user-tag { margin-left: auto; font-size: 12px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
  </style>
</head>

<body>

  <div id="login-overlay">
    <div class="login-box">
      <span class="close-login" onclick="closeLogin()">×</span>
      <h2 style="margin-top:0">Accesso</h2>
      <p style="font-size: 12px; color: #666;">Accedi per aggiungere o segnalare punti</p>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()" class="btn-primary" style="width: 100%; padding: 10px; margin-bottom: 5px;">ACCEDI</button>
      <button onclick="closeLogin()" style="width: 100%; padding: 10px; border: none; background: #eee;">ENTRA COME OSPITE</button>
    </div>
  </div>

  <div class="top-bar">
    <div class="slider-box">
      <span>Trasparenza:</span>
      <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="1">
      <span id="op-label">100%</span>
    </div>
    <div id="user-display" class="user-tag">Ospite (Sola Lettura)</div>
  </div>

  <div id="map"></div>
  <div id="coords-info">X: - | Y: -</div>

  <div class="panel">
    <div class="section">
      <h4 style="margin:0 0 8px 0; font-size:12px;">FILTRI MAPPA</h4>
      <label class="filter-item"><input type="checkbox" class="layer-chk" value="fabbricati" checked> Fabbricati</label>
      <label class="filter-item"><input type="checkbox" class="layer-chk" value="particelle" checked> Particelle</label>
      <label class="filter-item"><input type="checkbox" class="layer-chk" value="strade,acque" checked> Strade/Acque</label>
    </div>

    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <input id="qComune" placeholder="Cerca comune..." style="flex:1; padding:5px;">
        <button id="btnComune">Vai</button>
    </div>
    
    <button id="btnModePF" style="width:100%; background:#e7f3ff;">Inserimento PF: <strong>ON</strong></button>

    <div id="info-box">
        <span id="pf-name" style="font-weight:bold;"></span><br>
        <small id="pf-author"></small>
        <div id="pf-status" style="color:red; font-size:11px;"></div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button onclick="reportPF()" style="background:#fff3cd;">Segnala</button>
            <button id="btnDel" style="background:#f8d7da; display:none;" onclick="deletePF()">Elimina</button>
        </div>
    </div>
  </div>

<script>
/* 1. SETUP */
proj4.defs("EPSG:25832","+proj=utm +zone=32 +ellps=GRS80 +units=m +no_defs");
ol.proj.proj4.register(proj4);
const projection = ol.proj.get("EPSG:25832");

let currentUser = ""; // Vuoto = Ospite
let isAdmin = false;

function closeLogin() {
    document.getElementById("login-overlay").style.display = "none";
}

function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;
    if(!u) return alert("Inserisci uno username");
    
    currentUser = u;
    document.getElementById("user-display").textContent = "Utente: " + u;
    document.getElementById("user-display").style.color = "#f1c40f";
    
    if(u === "admin" && p === "admin") {
        isAdmin = true;
        document.getElementById('btnDel').style.display = 'block';
    }
    closeLogin();
}

/* 2. LAYERS */
const baseLayer = new ol.layer.Tile({
  source: new ol.source.XYZ({ url: 'https://{a-c}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png' })
});

const wmsSource = new ol.source.TileWMS({
  url: "https://catastovisual.princifranci.workers.dev/",
  params: { "LAYERS": "province,comuni,fogli,fabbricati,particelle,acque,strade", "FORMAT": "image/png", "TRANSPARENT": true, "VERSION": "1.3.0" },
  crossOrigin: "anonymous"
});

const catastalLayer = new ol.layer.Tile({ source: wmsSource, opacity: 1 });
const pfSource = new ol.source.Vector();

const map = new ol.Map({
  target: "map",
  layers: [
    baseLayer, catastalLayer, 
    new ol.layer.Vector({ source: pfSource, style: (f) => new ol.style.Style({
        image: new ol.style.Circle({ radius: 8, fill: new ol.style.Fill({ color: f.get("reported") ? "#ffc107" : "#dc3545" }), stroke: new ol.style.Stroke({ color: "#fff", width: 2 }) }),
        text: new ol.style.Text({ font: "bold 12px Arial", offsetY: -18, text: f.get("name"), fill: new ol.style.Fill({ color: "#000" }), stroke: new ol.style.Stroke({ color: "#fff", width: 3 }) })
    })})
  ],
  view: new ol.View({ projection: projection, center: ol.proj.transform([9.19, 45.46], "EPSG:4326", "EPSG:25832"), zoom: 17 })
});

/* 3. SLIDER */
document.getElementById('opacitySlider').addEventListener('input', function() {
    catastalLayer.setOpacity(parseFloat(this.value));
    document.getElementById('op-label').textContent = Math.round(this.value * 100) + "%";
});

/* 4. FILTRI */
document.querySelectorAll('.layer-chk').forEach(c => c.addEventListener('change', () => {
    let layers = ["province", "comuni", "fogli"];
    document.querySelectorAll('.layer-chk:checked').forEach(chk => layers.push(chk.value));
    wmsSource.updateParams({ "LAYERS": layers.join(',') });
}));

/* 5. LOGICA PF */
let pfMode = true;
let selected = null;

document.getElementById("btnModePF").addEventListener("click", function() {
    pfMode = !pfMode;
    this.innerHTML = `Inserimento PF: <strong>${pfMode ? 'ON' : 'OFF'}</strong>`;
});

map.on("singleclick", (e) => {
    let f = map.forEachFeatureAtPixel(e.pixel, feature => feature);
    if(f) {
        selected = f;
        document.getElementById("info-box").style.display = "block";
        document.getElementById("pf-name").textContent = f.get("name");
        document.getElementById("pf-author").textContent = "Autore: " + f.get("author");
        document.getElementById("pf-status").textContent = f.get("reported") ? "⚠️ SEGNALATO" : "";
    } else if(pfMode) {
        if(!currentUser) return alert("Devi accedere per aggiungere un punto!");
        const n = prompt("Nome PF:");
        if(!n) return;
        const feat = new ol.Feature({ geometry: new ol.geom.Point(e.coordinate), name: n, author: currentUser, reported: false });
        pfSource.addFeature(feat);
    }
});

function reportPF() { 
    if(!currentUser) return alert("Devi accedere per segnalare errori!");
    if(selected) { selected.set("reported", true); document.getElementById("pf-status").textContent = "⚠️ SEGNALATO"; } 
}
function deletePF() { if(isAdmin && selected) { pfSource.removeFeature(selected); document.getElementById("info-box").style.display = "none"; } }

/* 6. RICERCA E COORDS */
document.getElementById("btnComune").addEventListener("click", async () => {
  const q = document.getElementById("qComune").value;
  const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&countrycodes=it`);
  const d = await r.json();
  if(d.length) map.getView().animate({ center: ol.proj.transform([parseFloat(d[0].lon), parseFloat(d[0].lat)], "EPSG:4326", "EPSG:25832"), zoom: 17 });
});

map.on('pointermove', e => {
    const c = e.coordinate;
    if(c) document.getElementById("coords-info").innerHTML = `X: ${c[0].toFixed(2)} | Y: ${c[1].toFixed(2)}`;
});
</script>
</body>
</html>
