<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Catasto UTM 25832</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ol@latest/proj/proj4.js"></script>

<style>
html, body { margin:0; height:100%; }
#map { width:100%; height:100%; }
</style>
</head>
<body>

<div id="map"></div>

<script>

// definizione EPSG:25832
proj4.defs("EPSG:25832","+proj=utm +zone=32 +ellps=GRS80 +units=m +no_defs");
ol.proj.proj4.register(proj4);

const projection = ol.proj.get("EPSG:25832");

// centro Milano convertito in UTM 25832
const center = ol.proj.transform([9.19,45.46],"EPSG:4326","EPSG:25832");

const wmsLayer = new ol.layer.Tile({
  source: new ol.source.TileWMS({
    url: "https://wms.cartografia.agenziaentrate.gov.it/inspire/wms/ows01.php",
    params: {
      "LAYERS": "CP.CadastralParcel",
      "VERSION": "1.3.0"
    }
  })
});

const map = new ol.Map({
  target: "map",
  layers: [wmsLayer],
  view: new ol.View({
    projection: projection,
    center: center,
    zoom: 17,
    minZoom: 10,
    maxZoom: 22
  })
});

</script>
</body>
</html>
