<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Catasto Pro - Versione Originale Restaurata</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/proj/proj4.js"></script>

  <style>
    html, body { margin:0; height:100%; overflow: hidden; font-family: sans-serif; }
    #map { width:100%; height:100%; background: #ffffff; }

    /* BARRA SUPERIORE */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 50px;
      background: #2c3e50; display: flex; align-items: center;
      padding: 0 20px; color: white; z-index: 1001;
    }
    .slider-box { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 500px; }
    
    /* LOGIN */
    #login-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 2000;
    }
    .login-box { 
      background: white; padding: 30px; border-radius: 12px; text-align: center; 
      width: 300px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5); color: #333;
    }
    .login-box input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

    /* PANNELLO LATERALE */
    .panel {
      position: absolute; top: 60px; left: 10px; background: rgba(255,255,255,0.95);
      padding: 15px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.2);
      width: 270px; z-index: 1000; max-height: 85vh; overflow-y: auto;
    }

    .section { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
    .row { display: flex; gap: 5px; margin-bottom: 8px; }
    button { cursor:pointer; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; font-size: 12px; flex: 1; }
    button:hover { background: #f0f0f0; }
    .btn-primary { background: #007bff; color: white; border: none; }
    
    #info-box { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 6px; display: none; border-left: 5px solid #007bff; }
    #coords-info { position: absolute; bottom: 10px; right: 10px; background: white; padding: 5px; font-size: 12px; border: 1px solid #ccc; z-index: 1000; }
    .user-tag { margin-left: auto; font-size: 12px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
  </style>
</head>

<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2 style="margin-top:0">Accesso</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()" class="btn-primary" style="width: 100%; padding: 10px; margin-bottom: 5px;">ACCEDI</button>
      <button onclick="document.getElementById('login-overlay').style.display='none'" style="width: 100%; padding: 10px; border: none; background: #eee;">ENTRA COME OSPITE</button>
    </div>
  </div>

  <div class="top-bar">
    <div class="slider-box">
      <span>Trasparenza Catasto:</span>
      <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="1">
      <span id="op-label">100%</span>
    </div>
    <div id="user-display" class="user-tag">Ospite</div>
  </div>

  <div id="map"></div>
  <div id="coords-info">X: - | Y: -</div>

  <div class="panel">
    <div class="section">
      <h4 style="margin:0 0 8px 0; font-size:12px;">FILTRI MAPPA</h4>
      <label style="font-size:12px;"><input type="checkbox" class="layer-chk" value="fabbricati" checked> Fabbricati (Arancio)</label><br>
      <label style="font-size:12px;"><input type="checkbox" class="layer-chk" value="particelle" checked> Particelle (Nero)</label>
    </div>

    <div class="row">
        <input id="qComune" placeholder="Cerca comune..." style="flex:2; padding:5px;">
        <button onclick="cercaComune()" style="flex:1;">Vai</button>
    </div>
    
    <div style="height:1px; background:#ddd; margin:10px 0;"></div>
    
    <div class="row">
        <button id="btnModePF" onclick="togglePFMode()" style="background:#e7f3ff; border-color:#b8daff;">Inserimento PF: <b>ON</b></button>
    </div>
    <div class="row">
        <button onclick="collegaLinee()">Collega Linee</button>
        <button onclick="lineSource.clear()">Pulisci Linee</button>
    </div>

    <div id="info-box">
        <span id="pf-name" style="font-weight:bold; font-size: 14px;"></span><br>
        <small id="pf-author"></small>
        <button onclick="segnalaErrore()" style="margin-top:10px; background:#fff3cd; font-size:10px;">⚠️ Segnala Errore</button>
    </div>

    <div style="height:1px; background:#ddd; margin:10px 0;"></div>
    
    <div class="row">
        <button onclick="esportaDati()" style="background:#34495e; color:white;">Esporta JSON Database</button>
    </div>
  </div>

<script>
/* --- 1. SETUP PROIEZIONE --- */
proj4.defs("EPSG:25832","+proj=utm +zone=32 +ellps=GRS80 +units=m +no_defs");
ol.proj.proj4.register(proj4);
const projection = ol.proj.get("EPSG:25832");

let currentUser = "";
let pfMode = true;
let selectedPoints = [];

/* --- 2. LAYER MAPPA --- */
// Sfondo stradale leggero
const baseLayer = new ol.layer.Tile({
  source: new ol.source.XYZ({ url: 'https://{a-c}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png' })
});

// IL CATASTO (Target dello Slider)
const wmsSource = new ol.source.TileWMS({
  url: "https://wms.cartografia.agenziaentrate.gov.it/inspire/wms/ows01.php",
  params: { "LAYERS": "province,comuni,fogli,fabbricati,particelle,acque,strade", "FORMAT": "image/png", "TRANSPARENT": true, "VERSION": "1.3.0" },
  crossOrigin: "anonymous"
});
const catastoLayer = new ol.layer.Tile({ source: wmsSource, opacity: 1 });

const pfSource = new ol.source.Vector();
const lineSource = new ol.source.Vector();

const map = new ol.Map({
  target: "map",
  layers: [
    baseLayer, 
    catastoLayer, 
    new ol.layer.Vector({ source: lineSource, style: new ol.style.Style({ stroke: new ol.style.Stroke({ color: "#007bff", width: 3 }) }) }),
    new ol.layer.Vector({ source: pfSource, style: (f) => new ol.style.Style({
        image: new ol.style.Circle({ radius: 8, fill: new ol.style.Fill({ color: f.get("err") ? "#ffc107" : "#dc3545" }), stroke: new ol.style.Stroke({ color: "#fff", width: 2 }) }),
        text: new ol.style.Text({ font: "bold 13px Arial", offsetY: -18, text: f.get("name"), fill: new ol.style.Fill({ color: "#000" }), stroke: new ol.style.Stroke({ color: "#fff", width: 3 }) })
    })})
  ],
  view: new ol.View({ projection: projection, center: ol.proj.transform([8.73, 45.25], "EPSG:4326", "EPSG:25832"), zoom: 18 })
});

/* --- 3. LO SLIDER SUL CATASTO --- */
const slider = document.getElementById('opacitySlider');
slider.addEventListener('input', function() {
    const val = parseFloat(this.value);
    catastoLayer.setOpacity(val); // Agisce solo sulle linee del catasto
    document.getElementById('op-label').textContent = Math.round(val * 100) + "%";
});

/* --- 4. FUNZIONI PF --- */
function login() {
    currentUser = document.getElementById("username").value || "Utente";
    document.getElementById("user-display").textContent = "Utente: " + currentUser;
    document.getElementById("login-overlay").style.display = "none";
}

function togglePFMode() {
    pfMode = !pfMode;
    document.getElementById("btnModePF").innerHTML = `Inserimento PF: <b>${pfMode ? 'ON' : 'OFF'}</b>`;
    document.getElementById("btnModePF").style.background = pfMode ? "#e7f3ff" : "#f8f9fa";
}

map.on("singleclick", (e) => {
    let feat = map.forEachFeatureAtPixel(e.pixel, f => f);
    
    if(feat && feat.get("name")) {
        document.getElementById("info-box").style.display = "block";
        document.getElementById("pf-name").textContent = feat.get("name");
        document.getElementById("pf-author").textContent = "Inserito da: " + (feat.get("autore") || "Ospite");
        window.activePF = feat;
        
        selectedPoints.push(feat.getGeometry().getCoordinates());
        if(selectedPoints.length > 2) selectedPoints.shift();
    } else if(pfMode) {
        if(!currentUser) { alert("Accedi per aggiungere punti!"); return; }
        const n = prompt("Nome del PF:");
        if(n) {
            const f = new ol.Feature({ geometry: new ol.geom.Point(e.coordinate), name: n, autore: currentUser, err: false });
            pfSource.addFeature(f);
        }
    }
});

function collegaLinee() {
    if(selectedPoints.length === 2) {
        lineSource.addFeature(new ol.Feature(new ol.geom.LineString(selectedPoints)));
    } else { alert("Seleziona 2 PF cliccandoci sopra!"); }
}

function segnalaErrore() {
    if(window.activePF) {
        window.activePF.set("err", true);
        alert("Segnalazione inviata!");
    }
}

function esportaDati() {
    const d = pfSource.getFeatures().map(f => ({ n: f.get("name"), a: f.get("autore"), c: f.getGeometry().getCoordinates() }));
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type:"application/json"}));
    a.download = "database_pf.json"; a.click();
}

/* --- 5. UTILITY --- */
async function cercaComune() {
    const q = document.getElementById("qComune").value;
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}, Italy`);
    const d = await r.json();
    if(d.length) map.getView().animate({ center: ol.proj.transform([parseFloat(d[0].lon), parseFloat(d[0].lat)], "EPSG:4326", "EPSG:25832"), zoom: 17 });
}

document.querySelectorAll('.layer-chk').forEach(c => c.addEventListener('change', () => {
    let layers = ["province", "comuni", "fogli", "acque", "strade"];
    document.querySelectorAll('.layer-chk:checked').forEach(chk => layers.push(chk.value));
    wmsSource.updateParams({ "LAYERS": layers.join(',') });
}));

map.on('pointermove', e => {
    const c = e.coordinate;
    if(c) document.getElementById("coords-info").innerHTML = `X: ${c[0].toFixed(2)} | Y: ${c[1].toFixed(2)}`;
});
</script>
</body>
</html>
