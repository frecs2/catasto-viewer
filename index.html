<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catasto - Solo mappa colorata</title>

  <!-- NO @latest -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/proj/proj4.js"></script>

  <style>
    html, body { margin:0; height:100%; }
    #map { width:100%; height:100%; }
  </style>
</head>

<body>
  <div id="map"></div>

<script>
/* =========================
   CONFIG
   ========================= */
const WMS_URL = "https://catastovisual.princifranci.workers.dev/";

/* =========================
   PROIEZIONE EPSG:25832
   ========================= */
proj4.defs("EPSG:25832","+proj=utm +zone=32 +ellps=GRS80 +units=m +no_defs");
ol.proj.proj4.register(proj4);

const projection = ol.proj.get("EPSG:25832");
const center = ol.proj.transform([9.19, 45.46], "EPSG:4326", "EPSG:25832"); // Milano

/* =========================
   WMS helper
   ========================= */
function makeWmsLayer(layerName){
  return new ol.layer.Tile({
    source: new ol.source.TileWMS({
      url: WMS_URL,
      params: {
        SERVICE: "WMS",
        VERSION: "1.3.0",
        REQUEST: "GetMap",
        LAYERS: layerName,
        STYLES: "",
        FORMAT: "image/png",
        TRANSPARENT: true,
        TILED: true
      },
      crossOrigin: "anonymous"
    })
  });
}

/* =========================
   MAP init (layer placeholder)
   ========================= */
const wmsLayer = makeWmsLayer("CP.CadastralParcel"); // fallback
const map = new ol.Map({
  target: "map",
  layers: [wmsLayer],
  view: new ol.View({
    projection,
    center,
    zoom: 17,
    minZoom: 10,
    maxZoom: 22
  })
});

/* =========================
   Auto-pick "mappa colorata" da GetCapabilities
   ========================= */
async function fetchCapabilitiesNames(){
  const url = `${WMS_URL}?SERVICE=WMS&REQUEST=GetCapabilities&VERSION=1.3.0`;
  const res = await fetch(url, { headers: { "Accept": "application/xml,text/xml" }});
  if(!res.ok) throw new Error(`GetCapabilities HTTP ${res.status}`);
  const xmlText = await res.text();
  const xml = new DOMParser().parseFromString(xmlText, "application/xml");
  const names = [...xml.querySelectorAll("Layer > Name")]
    .map(n => n.textContent?.trim())
    .filter(Boolean);
  return [...new Set(names)];
}

function pickStyledMapLayer(names){
  // euristica: cerco layer che suonano come "mappa/cartografia"
  // e che NON siano solo parcel/parcelle.
  const score = (n) => {
    const s = n.toLowerCase();
    let v = 0;
    if(s.includes("map")) v += 5;
    if(s.includes("cart")) v += 5;        // carto/cartografia
    if(s.includes("cadastral")) v += 3;
    if(s.includes("catast")) v += 3;
    if(s.includes("building")) v += 2;
    if(s.includes("road")) v += 2;
    if(s.includes("label") || s.includes("text")) v += 1;
    if(s.includes("parcel") || s.includes("parc")) v -= 4; // vogliamo evitare la sola parcella
    return v;
  };

  const ranked = names
    .map(n => ({ n, v: score(n) }))
    .sort((a,b) => b.v - a.v);

  // prendo il primo “sensato”
  const best = ranked.find(x => x.v >= 5);
  return best?.n || null;
}

(async () => {
  try{
    const names = await fetchCapabilitiesNames();
    const best = pickStyledMapLayer(names);

    if(best){
      // imposto il layer scelto
      wmsLayer.getSource().updateParams({ LAYERS: best });
      // utile per verificare in console
      console.log("Layer catasto selezionato:", best);
    } else {
      console.warn("Nessun layer 'mappa' trovato. Resto su CP.CadastralParcel.");
    }
  }catch(e){
    console.error("Impossibile leggere GetCapabilities:", e);
    // se fallisce, resti col fallback
  }
})();
</script>
</body>
</html>
