<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Catasto Collaborative - REBORN</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/proj/proj4.js"></script>

  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; overflow: hidden; font-family: sans-serif; }
    #map { position: absolute; top: 50px; bottom: 0; width: 100%; background: white; }

    .top-bar {
      height: 50px; background: #2c3e50; color: white;
      display: flex; align-items: center; padding: 0 15px; gap: 20px;
    }

    #login-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; z-index: 2000;
    }
    .login-box { background: white; padding: 25px; border-radius: 8px; color: #333; text-align: center; }

    .panel {
      position: absolute; top: 60px; left: 10px; width: 260px;
      background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2); z-index: 1000;
    }

    .section { border-bottom: 1px solid #ccc; margin-bottom: 10px; padding-bottom: 10px; }
    button { cursor: pointer; padding: 8px; margin: 2px 0; width: 100%; }
    input[type="text"] { width: 100%; padding: 5px; box-sizing: border-box; }
    
    #info-box { background: #eee; padding: 10px; margin-top: 10px; display: none; border-left: 4px solid #007bff; }
  </style>
</head>

<body>

  <div id="login-overlay">
    <div class="login-box">
      <h3>Benvenuto</h3>
      <input type="text" id="username" placeholder="Username" style="margin-bottom:10px;"><br>
      <button onclick="login()" style="background:#007bff; color:white; border:none;">ACCEDI</button>
      <button onclick="document.getElementById('login-overlay').style.display='none'" style="border:none; background:none; color:#666; cursor:pointer;">Entra come ospite</button>
    </div>
  </div>

  <div class="top-bar">
    <strong>Trasparenza Catasto:</strong>
    <input type="range" id="opSlider" min="0" max="1" step="0.1" value="1" style="width:200px;">
    <span id="opValue">100%</span>
    <span id="userDisp" style="margin-left:auto; color:#f1c40f;">Ospite</span>
  </div>

  <div id="map"></div>

  <div class="panel">
    <div class="section">
      <label><input type="checkbox" class="lay-chk" value="fabbricati" checked> Fabbricati</label><br>
      <label><input type="checkbox" class="lay-chk" value="particelle" checked> Particelle</label>
    </div>

    <div class="section">
      <input id="cercaComune" placeholder="Cerca Comune...">
      <button onclick="vaiAlComune()">Vai</button>
    </div>

    <div class="section">
      <button id="modeBtn" onclick="toggleMode()" style="background:#d4edda;">Modo: INSERIMENTO</button>
      <button onclick="collegaPunti()">Collega 2 Punti</button>
      <button onclick="lineSource.clear()">Pulisci Linee</button>
    </div>

    <div id="info-box">
      <b id="det-nome"></b><br>
      <small id="det-autore"></small>
      <button onclick="segnalaErrato()" style="margin-top:5px; font-size:10px;">Segnala Errore</button>
    </div>
    
    <button onclick="esportaDati()" style="margin-top:10px; font-size:11px;">Esporta Database JSON</button>
  </div>

<script>
/* 1. COORDINATE E PROIEZIONE */
proj4.defs("EPSG:25832","+proj=utm +zone=32 +ellps=GRS80 +units=m +no_defs");
ol.proj.proj4.register(proj4);
const proj25832 = ol.proj.get("EPSG:25832");

let utente = "";
let inserimentoAttivo = true;
let puntiSelezionati = [];

/* 2. LAYER MAPPA */
const baseLayer = new ol.layer.Tile({ source: new ol.source.OSM() });

const catastoSource = new ol.source.TileWMS({
  url: "https://catastovisual.princifranci.workers.dev/",
  params: {'LAYERS': 'province,comuni,fogli,fabbricati,particelle,acque,strade', 'TILED': true, 'VERSION': '1.3.0'},
  crossOrigin: 'anonymous'
});
const catastoLayer = new ol.layer.Tile({ source: catastoSource, opacity: 1 });

const pfSource = new ol.source.Vector();
const lineSource = new ol.source.Vector();

const map = new ol.Map({
  target: 'map',
  layers: [
    baseLayer, 
    catastoLayer,
    new ol.layer.Vector({ source: lineSource, style: new ol.style.Style({ stroke: new ol.style.Stroke({color: '#007bff', width: 3}) }) }),
    new ol.layer.Vector({ source: pfSource, style: (f) => new ol.style.Style({
        image: new ol.style.Circle({ radius: 7, fill: new ol.style.Fill({color: f.get('err') ? 'orange' : 'red'}), stroke: new ol.style.Stroke({color:'white', width:2}) }),
        text: new ol.style.Text({ text: f.get('name'), offsetY: -15, font: 'bold 12px sans-serif', fill: new ol.style.Fill({color:'#000'}), stroke: new ol.style.Stroke({color:'#fff', width:3}) })
    })})
  ],
  view: new ol.View({ projection: proj25832, center: ol.proj.transform([9.19, 45.46], 'EPSG:4326', 'EPSG:25832'), zoom: 17 })
});

/* 3. FUNZIONI CORE */
function login() {
  utente = document.getElementById('username').value || "Utente";
  document.getElementById('userDisp').textContent = utente;
  document.getElementById('login-overlay').style.display = 'none';
}

// FIX SLIDER: Aggiorna l'opacità in tempo reale
document.getElementById('opSlider').oninput = function() {
  const v = parseFloat(this.value);
  catastoLayer.setOpacity(v);
  document.getElementById('opValue').textContent = Math.round(v*100) + "%";
};

// GESTIONE CLICK SULLA MAPPA
map.on('singleclick', function(e) {
  let feature = map.forEachFeatureAtPixel(e.pixel, f => f);
  
  if (feature && feature.get('name')) {
    // Se clicco un punto esistente
    document.getElementById('info-box').style.display = 'block';
    document.getElementById('det-nome').textContent = feature.get('name');
    document.getElementById('det-autore').textContent = "Da: " + feature.get('autore');
    window.selectedPF = feature;
    
    // Lo aggiungo alla coda per il collegamento
    puntiSelezionati.push(feature.getGeometry().getCoordinates());
    if(puntiSelezionati.length > 2) puntiSelezionati.shift();
    
  } else if (inserimentoAttivo) {
    // Se clicco nel vuoto e sono in modalità inserimento
    if(!utente) { alert("Accedi per inserire!"); return; }
    let nome = prompt("Nome Punto Fiduciale:");
    if(nome) {
      let f = new ol.Feature({ geometry: new ol.geom.Point(e.coordinate), name: nome, autore: utente, err: false });
      pfSource.addFeature(f);
    }
  }
});

function toggleMode() {
  inserimentoAttivo = !inserimentoAttivo;
  const btn = document.getElementById('modeBtn');
  btn.textContent = inserimentoAttivo ? "Modo: INSERIMENTO" : "Modo: SELEZIONE";
  btn.style.background = inserimentoAttivo ? "#d4edda" : "#fff3cd";
}

function collegaPunti() {
  if(puntiSelezionati.length < 2) return alert("Clicca su 2 punti prima!");
  lineSource.addFeature(new ol.Feature(new ol.geom.LineString(puntiSelezionati)));
}

function segnalaErrato() {
  if(window.selectedPF) {
    window.selectedPF.set('err', true);
    alert("Punto segnalato!");
  }
}

async function vaiAlComune() {
  let c = document.getElementById('cercaComune').value;
  let r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${c}, Italy`);
  let d = await r.json();
  if(d.length > 0) {
    map.getView().animate({ center: ol.proj.transform([parseFloat(d[0].lon), parseFloat(d[0].lat)], 'EPSG:4326', 'EPSG:25832'), zoom: 17 });
  }
}

// Filtri Layer
document.querySelectorAll('.lay-chk').forEach(cb => {
  cb.onchange = function() {
    let active = ['province', 'comuni', 'fogli'];
    document.querySelectorAll('.lay-chk:checked').forEach(c => active.push(c.value));
    catastoSource.updateParams({'LAYERS': active.join(',')});
  };
});

function esportaDati() {
  let feats = pfSource.getFeatures().map(f => ({ n: f.get('name'), a: f.get('autore'), c: f.getGeometry().getCoordinates() }));
  let blob = new Blob([JSON.stringify(feats)], {type: "application/json"});
  let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "catasto_db.json"; a.click();
}
</script>
</body>
</html>
