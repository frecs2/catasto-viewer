<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Catasto Pro - Completo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol@latest/proj/proj4.js"></script>

  <style>
    html, body { margin:0; height:100%; overflow: hidden; font-family: sans-serif; }
    #map { width:100%; height:100%; background: #ffffff; }

    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 50px;
      background: #2c3e50; display: flex; align-items: center;
      padding: 0 20px; color: white; z-index: 1001;
    }
    .slider-box { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 500px; }
    
    #login-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 2000;
    }
    .login-box { 
      background: white; padding: 30px; border-radius: 12px; text-align: center; 
      width: 300px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .close-login { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; color: #999; font-weight: bold; }
    .login-box input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

    .panel {
      position: absolute; top: 60px; left: 10px; background: rgba(255,255,255,0.95);
      padding: 15px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.2);
      width: 270px; z-index: 1000; max-height: 85vh; overflow-y: auto; /* Permette lo scorrimento se ci sono tanti tasti */
    }

    .section { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
    .filter-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 6px; cursor: pointer; }

    .row { display: flex; gap: 5px; margin-bottom: 8px; }
    button { cursor:pointer; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; font-size: 12px; flex: 1; }
    button:hover { background: #f0f0f0; }
    .btn-primary { background: #007bff; color: white; border: none; }
    .btn-primary:hover { background: #0056b3; }
    
    #info-box { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 6px; display: none; border-left: 5px solid #007bff; }
    #coords-info { position: absolute; bottom: 10px; right: 10px; background: white; padding: 5px; font-family: monospace; font-size: 12px; border: 1px solid #ccc; }
    
    .user-tag { margin-left: auto; font-size: 12px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
  </style>
</head>

<body>

  <div id="login-overlay">
    <div class="login-box">
      <span class="close-login" onclick="closeLogin()">×</span>
      <h2 style="margin-top:0">Accesso</h2>
      <p style="font-size: 12px; color: #666;">Accedi per aggiungere o segnalare punti</p>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()" class="btn-primary" style="width: 100%; padding: 10px; margin-bottom: 5px;">ACCEDI</button>
      <button onclick="closeLogin()" style="width: 100%; padding: 10px; border: none; background: #eee;">ENTRA COME OSPITE</button>
    </div>
  </div>

  <div class="top-bar">
    <div class="slider-box">
      <span>Trasparenza:</span>
      <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="1">
      <span id="op-label">100%</span>
    </div>
    <div id="user-display" class="user-tag">Ospite (Sola Lettura)</div>
  </div>

  <div id="map"></div>
  <div id="coords-info">X: - | Y: -</div>

  <div class="panel">
    <div class="section">
      <h4 style="margin:0 0 8px 0; font-size:12px;">FILTRI MAPPA</h4>
      <label class="filter-item"><input type="checkbox" class="layer-chk" value="fabbricati" checked> Fabbricati</label>
      <label class="filter-item"><input type="checkbox" class="layer-chk" value="particelle" checked> Particelle</label>
      <label class="filter-item"><input type="checkbox" class="layer-chk" value="strade,acque" checked> Strade/Acque</label>
    </div>

    <div class="row">
        <input id="qComune" placeholder="Cerca comune..." style="flex:2; padding:5px;">
        <button id="btnComune" style="flex:1;">Vai</button>
    </div>
    
    <div style="height:1px; background:#ddd; margin:10px 0;"></div>
    
    <div class="row">
        <button id="btnModePF" style="background:#e7f3ff; border-color:#b8daff;">Inserimento PF: <strong>ON</strong></button>
    </div>
    <div class="row">
        <button id="btnConnect">Collega Linee</button>
        <button onclick="tempSource.clear()">Pulisci Linee</button>
    </div>

    <div id="info-box">
        <span id="pf-name" style="font-weight:bold; font-size: 14px;"></span><br>
        <small id="pf-author"></small>
        <div id="pf-status" style="color:red; font-size:11px; font-weight:bold; margin-top:4px;"></div>
        <div class="row" style="margin-top:10px;">
            <button onclick="reportPF()" style="background:#fff3cd; color:#856404; border-color:#ffeeba;">⚠️ Segnala</button>
            <button id="btnDel" style="background:#f8d7da; color:#721c24; border-color:#f5c6cb; display:none;" onclick="deletePF()">🗑️ Elimina</button>
        </div>
    </div>

    <div style="height:1px; background:#ddd; margin:10px 0;"></div>
    
    <div class="row">
        <button id="btnExport">Esporta JSON</button>
    </div>
  </div>

<script>
/* --- 1. SETUP --- */
proj4.defs("EPSG:25832","+proj=utm +zone=32 +ellps=GRS80 +units=m +no_defs");
ol.proj.proj4.register(proj4);
const projection = ol.proj.get("EPSG:25832");

let currentUser = ""; 
let isAdmin = false;
const LS_KEY = "catasto_pf_completo_v1"; // Chiave per il salvataggio

function closeLogin() { document.getElementById("login-overlay").style.display = "none"; }

function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;
    if(!u) return alert("Inserisci uno username");
    
    currentUser = u;
    document.getElementById("user-display").textContent = "Utente: " + u;
    document.getElementById("user-display").style.color = "#f1c40f";
    
    if(u === "admin" && p === "admin") {
        isAdmin = true;
        document.getElementById('btnDel').style.display = 'block';
    }
    closeLogin();
}

/* --- 2. LAYERS --- */
const baseLayer = new ol.layer.Tile({
  source: new ol.source.XYZ({ url: 'https://{a-c}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png' })
});

const wmsSource = new ol.source.TileWMS({
  url: "https://catastovisual.princifranci.workers.dev/",
  params: { "LAYERS": "province,comuni,fogli,fabbricati,particelle,acque,strade", "FORMAT": "image/png", "TRANSPARENT": true, "VERSION": "1.3.0" },
  crossOrigin: "anonymous"
});

const catastalLayer = new ol.layer.Tile({ source: wmsSource, opacity: 1 });

const pfSource = new ol.source.Vector();
const tempSource = new ol.source.Vector(); // Livello per le linee

const map = new ol.Map({
  target: "map",
  layers: [
    baseLayer, 
    catastalLayer, 
    new ol.layer.Vector({ source: tempSource, style: new ol.style.Style({ stroke: new ol.style.Stroke({ color: "#007bff", width: 3 }) }) }),
    new ol.layer.Vector({ source: pfSource, style: (f) => new ol.style.Style({
        image: new ol.style.Circle({ radius: 8, fill: new ol.style.Fill({ color: f.get("reported") ? "#ffc107" : "#dc3545" }), stroke: new ol.style.Stroke({ color: "#fff", width: 2 }) }),
        text: new ol.style.Text({ font: "bold 13px Arial", offsetY: -18, text: f.get("name"), fill: new ol.style.Fill({ color: "#000" }), stroke: new ol.style.Stroke({ color: "#fff", width: 3 }) })
    })})
  ],
  view: new ol.View({ projection: projection, center: ol.proj.transform([9.19, 45.46], "EPSG:4326", "EPSG:25832"), zoom: 17 })
});

/* --- 3. SLIDER E FILTRI --- */
document.getElementById('opacitySlider').addEventListener('input', function() {
    catastalLayer.setOpacity(parseFloat(this.value));
    document.getElementById('op-label').textContent = Math.round(this.value * 100) + "%";
});

document.querySelectorAll('.layer-chk').forEach(c => c.addEventListener('change', () => {
    let layers = ["province", "comuni", "fogli"];
    document.querySelectorAll('.layer-chk:checked').forEach(chk => layers.push(chk.value));
    wmsSource.updateParams({ "LAYERS": layers.join(',') });
}));

/* --- 4. GESTIONE DATI (SALVATAGGIO) --- */
function saveData() {
    const data = pfSource.getFeatures().map(f => {
        const c = f.getGeometry().getCoordinates();
        return { id: f.getId(), name: f.get("name"), author: f.get("author"), reported: f.get("reported"), x: c[0], y: c[1] };
    });
    localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function loadData() {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    try {
        JSON.parse(raw).forEach(it => {
            const f = new ol.Feature({ geometry: new ol.geom.Point([it.x, it.y]), name: it.name, author: it.author, reported: it.reported });
            f.setId(it.id);
            pfSource.addFeature(f);
        });
    } catch(e) {}
}
loadData(); // Carica i dati all'avvio

/* --- 5. LOGICA PF E INTERAZIONI --- */
let pfMode = true;
let selected = null;
let pointsToConnect = []; // Array per collegare le linee

document.getElementById("btnModePF").addEventListener("click", function() {
    pfMode = !pfMode;
    this.innerHTML = `Inserimento PF: <strong>${pfMode ? 'ON' : 'OFF'}</strong>`;
    this.style.background = pfMode ? "#e7f3ff" : "#f8f9fa";
});

map.on("singleclick", (e) => {
    let f = map.forEachFeatureAtPixel(e.pixel, feature => feature);
    
    if(f && f.get("name")) { // Se ho cliccato un PF
        selected = f;
        document.getElementById("info-box").style.display = "block";
        document.getElementById("pf-name").textContent = f.get("name");
        document.getElementById("pf-author").textContent = "Inserito da: " + (f.get("author") || "Sconosciuto");
        document.getElementById("pf-status").textContent = f.get("reported") ? "⚠️ PUNTO SEGNALATO" : "";
        
        // Aggiungo ai punti da collegare (se clicco su collega)
        pointsToConnect.push(f.getGeometry().getCoordinates());
        if(pointsToConnect.length > 2) pointsToConnect.shift(); // Tieni solo gli ultimi 2

    } else if(pfMode) {
        if(!currentUser) return alert("Devi accedere per aggiungere un punto sulla mappa!");
        const n = prompt("Nome del nuovo Punto Fiduciale:");
        if(!n || n.trim() === "") return;
        
        const feat = new ol.Feature({ geometry: new ol.geom.Point(e.coordinate), name: n, author: currentUser, reported: false });
        feat.setId(crypto.randomUUID());
        pfSource.addFeature(feat);
        saveData(); // Salvo subito
        pointsToConnect = []; // Resetta i collegamenti
    } else {
        document.getElementById("info-box").style.display = "none";
        selected = null;
    }
});

/* Comandi PF */
function reportPF() { 
    if(!currentUser) return alert("Devi accedere per segnalare errori!");
    if(selected && confirm("Vuoi segnalare questo punto come errato?")) { 
        selected.set("reported", true); 
        document.getElementById("pf-status").textContent = "⚠️ PUNTO SEGNALATO";
        saveData();
    } 
}

function deletePF() { 
    if(isAdmin && selected && confirm("Sei sicuro di voler eliminare definitivamente questo punto?")) { 
        pfSource.removeFeature(selected); 
        document.getElementById("info-box").style.display = "none";
        saveData();
    } 
}

document.getElementById("btnConnect").addEventListener("click", () => {
    if(pointsToConnect.length === 2) {
        tempSource.addFeature(new ol.Feature(new ol.geom.LineString(pointsToConnect)));
    } else {
        alert("Clicca su 2 Punti Fiduciali diversi per collegarli!");
    }
});

document.getElementById("btnExport").addEventListener("click", () => {
    const data = localStorage.getItem(LS_KEY);
    if(!data) return alert("Nessun dato da esportare");
    const blob = new Blob([data], {type:"application/json"});
    const a = document.createElement("a"); 
    a.href = URL.createObjectURL(blob); 
    a.download="database_pf.json"; 
    a.click();
});

/* --- 6. UTILITIES --- */
document.getElementById("btnComune").addEventListener("click", async () => {
  const q = document.getElementById("qComune").value.trim();
  if(!q) return;
  const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=it`);
  const d = await r.json();
  if(d.length) map.getView().animate({ center: ol.proj.transform([parseFloat(d[0].lon), parseFloat(d[0].lat)], "EPSG:4326", "EPSG:25832"), zoom: 17 });
});

map.on('pointermove', e => {
    const c = e.coordinate;
    if(c) document.getElementById("coords-info").innerHTML = `X: ${c[0].toFixed(2)} | Y: ${c[1].toFixed(2)}`;
});
</script>
</body>
</html>
